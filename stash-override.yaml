# ============================================================
# Stash 覆写配置文件
# 基于 OpenClash smart.yaml 转换
# ============================================================
# 使用方法：
#   Stash → 设置 → 覆写 → 导入此文件
#   更新订阅后，覆写自动合并，保护自定义配置不被覆盖
# ============================================================
# 与原 OpenClash 配置的关键差异：
#   ✅ dialer-proxy → relay 代理组（iOS 网络切换更稳定）
#   ✅ smart 类型 → url-test（Stash 兼容性；smart/LightGBM 为 Mihomo 专有）
#   ✅ 直连代理 → 保留别名以兼容规则引用
#   ✅ 所有自定义规则/策略组/规则集均保留
#   ❌ 删除 proxy-providers（由订阅管理）
#   ❌ 删除通用设置（port/tun/dns/sniffer 等，由 Stash 管理）
# ============================================================

proxies:
  # 直连别名（兼容规则中的 "直连" 引用）
  - name: "直连"
    type: direct

  # US 静态 IP SOCKS5 — 无 dialer-proxy，由 relay 组负责链式代理
  - name: "US-SOCKS5-Raw"
    type: socks5
    server: 64.32.187.244
    port: 443
    username: "QsAGnasbSCym"
    password: "RhK3h9xxi2"
    udp: true
    skip-cert-verify: true

# ============================================================
# 代理组
# ============================================================

# YAML 锚点：主选择组的代理列表（多个组共用）
pr: &pr
  type: select
  proxies:
    - 🚀 默认代理
    - ♻️ 香港智能
    - ♻️ 日本智能
    - ♻️ 台湾自动选择
    - ♻️ 美国智能
    - ♻️ 加坡智能
    - ♻️ 欧洲智能
    - 🔯 香港故转
    - 🔯 日本故转
    - ♻️ 自动选择
    - 🇭🇰 香港节点
    - 🇹🇼 台湾节点
    - 🇯🇵 日本节点
    - 🇺🇲 美国节点
    - 🇬🇧 英国节点
    - 🇫🇷 法国节点
    - 🌐 全部节点
    - 直连

proxy-groups:
  # === 链式代理（relay 模式）===
  # 第一跳通过机场节点，第二跳到 US 静态 IP
  # iOS 网络切换时 relay 会重新建链，不会出现 "closed network connection"
  - name: "🔗 US-Static-Chain"
    type: relay
    proxies:
      - 🚀 默认代理
      - US-SOCKS5-Raw

  # === 主选择组 ===
  - name: 🚀 默认代理
    type: select
    proxies:
      - ♻️ 香港智能
      - ♻️ 日本智能
      - ♻️ 台湾自动选择
      - ♻️ 美国智能
      - ♻️ 加坡智能
      - ♻️ 欧洲智能
      - 🔯 香港故转
      - 🔯 日本故转
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇬🇧 英国节点
      - 🇫🇷 法国节点
      - 🌐 全部节点
      - 直连

  # === 功能策略组 ===
  - { name: 📹 YouTube, <<: *pr }
  - { name: 👨🏿‍💻 GitHub, <<: *pr }
  - { name: 🐬 OneDrive, <<: *pr }
  - { name: 🪟 Microsoft, <<: *pr }
  - { name: 🎵 TikTok, <<: *pr }
  - { name: 📲 Telegram, <<: *pr }
  - { name: 🎥 NETFLIX, <<: *pr }
  - { name: ✈️ Speedtest, <<: *pr }
  - { name: 💶 PayPal, <<: *pr }

  # === AI 服务（链式静态 IP 优先）===
  - name: 🤖 ChatGPT
    type: select
    proxies:
      - "🔗 US-Static-Chain"
      - US-SOCKS5-Raw
      - 🚀 默认代理
      - ♻️ 美国智能
      - ♻️ 香港智能
      - 🇺🇲 美国节点
      - 直连

  # === Google 服务（链式静态 IP 优先）===
  - name: 🍀 Google
    type: select
    proxies:
      - "🔗 US-Static-Chain"
      - US-SOCKS5-Raw
      - 🚀 默认代理
      - ♻️ 美国智能
      - ♻️ 香港智能
      - 🇺🇲 美国节点
      - 直连

  # === 加密货币（台湾优先）===
  - name: 🪙 Crypto
    type: select
    proxies:
      - ♻️ 台湾自动选择
      - 🇹🇼 台湾节点
      - 🚀 默认代理
      - 直连

  # === Apple 服务 ===
  - name: 🍎 Apple
    type: select
    proxies:
      - 直连
      - 🚀 默认代理

  # === 银行 ===
  - name: 🏦 HSBC
    type: select
    proxies:
      - 🇬🇧 英国节点
      - 🇭🇰 香港节点
      - 🌐 全部节点
      - 🚀 默认代理
      - 直连

  - name: 🏦 iFAST
    type: select
    proxies:
      - 🇬🇧 英国节点
      - 🇭🇰 香港节点
      - ♻️ 加坡智能
      - 🌐 全部节点
      - 🚀 默认代理
      - 直连

  # === 直连组 ===
  - name: 🎯 直连
    type: select
    proxies:
      - 直连
      - 🚀 默认代理

  # === 兜底 ===
  - { name: 🐟 漏网之鱼, <<: *pr }

  # === 节点筛选组（按地区过滤订阅节点）===
  - name: 🇭🇰 香港节点
    type: select
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 🇯🇵 日本节点
    type: select
    include-all: true
    filter: "(?i)日|jp|japan"

  - name: 🇹🇼 台湾节点
    type: select
    include-all: true
    filter: "(?i)台|tw|taiwan"

  - name: 🇺🇲 美国节点
    type: select
    include-all: true
    filter: "(?i)美|us|unitedstates|united states"

  - name: 🇬🇧 英国节点
    type: select
    include-all: true
    filter: "(?=.*(英国|UK|(?i)Britain|British))^((?!(港|台|日|韩|美|新|欧)).)*$"

  - name: 🇫🇷 法国节点
    type: select
    include-all: true
    filter: "(?i)fr|france|french|paris"

  # === 自动测速 / 故障转移组 ===
  # 原 OpenClash 使用 smart 类型（LightGBM），Stash 不支持，改为 url-test
  - name: 🔯 香港故转
    type: fallback
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"

  - name: 🔯 日本故转
    type: fallback
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"

  - name: ♻️ 香港智能
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"

  - name: ♻️ 日本智能
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"

  - name: ♻️ 台湾自动选择
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?i)台|tw|taiwan"

  - name: ♻️ 美国智能
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"

  - name: ♻️ 加坡智能
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(新|SG|(?i)SG|Singapore))^((?!(港|台|日|韩|美)).)*$"

  - name: ♻️ 欧洲智能
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(Great Britain|(?i)France|Italy|Kazakhstan|Germany|Kingdom|Turkey|Switzerland|Netherlands))^((?!(港|台|日|韩|美|新|台)).)*$"

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "^((?!(直连)).)*$"

  - name: 🌐 全部节点
    type: select
    include-all: true

