name: Daily Market Analysis

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET (summer/EDT) or 4:30 PM ET (winter/EST)
    # 北京时间：夏令时 次日 05:30，冬令时 次日 05:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 手动触发，用于测试

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run analysis & send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/market_analysis.py
